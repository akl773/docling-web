services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: sqlite:////data/app.db
      DATA_DIR: /data
      OMP_NUM_THREADS: "4"
      PYTHONUNBUFFERED: "1"
      FRONTEND_DIST_DIR: /app/frontend-dist
      MAX_CONCURRENT_JOBS: "1"
    volumes:
      - app_data:/data
      - docling_cache:/root/.cache/docling
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  app_data:
  docling_cache:
